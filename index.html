<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GameHunt</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <section class="snake-game">

    <!-- GAME INFO -->

    <section class="info">

      <div>
        <h3>High Score: <span class="high-score">0</span></h3>
      </div>

      <div>
        <h3>Score: <span class="score">0</span></h3>
      </div>

      <div>
        <h3>Time: <span class="time">00:00</span></h3>
      </div>

    </section>


    <!-- GAME BOARD -->

    <section class="board"></section>



    <!-- MODAL -->

    <div class="modal">

      <!-- START SCREEN -->

      <div class="start-game">

        <h2>Welcome to Snake Hunt</h2>

        <button class="btn-start btn">
          Start Game
        </button>

      </div>



      <!-- GAME OVER SCREEN -->

      <div class="game-over">

        <h2>Game Over</h2>

        <button class="btn-restart btn">
          Restart Game
        </button>

      </div>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
