<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>GameHunt</title>
</head>
<body>
    <section class="snake-game">
        <section class="info">
            <div >
                <h3>High Score: <span>0</span></h3>
            </div>
            <div >
                <h3>Score: <span>0</span></h3>
            </div>
            <div >
                <h3>Time: <span>00-00</span></h3>
            </div>
        </section>
        <section class="board"></section>
        <div class="modal">
            <div class="start-game">
                <h3>Welcome to Snake Hunt</h3>
                <button class=" btn-start btn">Start Game</button>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class=" btn-restart btn">Restart Game</button>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
